version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: buddyup_order_postgres
    environment:
      POSTGRES_USER: buddyup
      POSTGRES_PASSWORD: buddyup_dev_123
      POSTGRES_DB: buddyup_order_db
    ports:
      - "5435:5432"
    volumes:
      - order_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buddyup"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - buddyup_network

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buddyup_order
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "3004:3004"
    volumes:
      - ./src:/app/src
    networks:
      - buddyup_network

volumes:
  order_pgdata:

networks:
  buddyup_network:
    driver: bridge
